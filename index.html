<script>
function calc(){
let income = Number(document.getElementById('income').value);
let google = Number(document.getElementById('google').value);
let story = Number(document.getElementById('story').value);

let percent = 0;
let bonus = 0;
let reward = 0;
let msg = "";

if(income < 40000){
    msg = "باقي لك " + (40000 - income).toLocaleString() + " ريال وتدخل المستوى الأول";
    reward = 0;
}
else if(income < 50000){
    percent = 0.03;
    msg = "ما شاء الله، بداية ممتازة، باقي لك " + (50000 - income).toLocaleString() + " ريال وتوصل المستوى الثاني";
}
else if(income < 60000){
    percent = 0.05;
    msg = "واضح تقدمك، باقي لك " + (60000 - income).toLocaleString() + " ريال وتوصل المستوى الثالث، الله يوفقك";
}
else if(income < 70000){
    percent = 0.06;
    msg = "ما شاء الله، قريب من القمة، باقي لك " + (70000 - income).toLocaleString() + " ريال وتوصل المستوى الرابع، الله يبارك لك";
}
else{
    percent = 0.07;
    msg = "ما شاء الله، وصلت أعلى مستوى، الله يبارك لك ويزيدك";
}

if(google >= 6 && story >= 6 && income >= 40000){
    bonus = 0.01;
}

if(income >= 40000){
    reward = income * (percent + bonus);
}

document.getElementById('output').innerHTML =
msg + "<br><br>المكافأة: " + reward.toLocaleString() + " ريال";
}
</script>
